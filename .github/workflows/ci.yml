name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check backend starts
        run: |
          cd backend
          echo "SUPABASE_URL=http://fake.supabase.co" > .env
          echo "SUPABASE_KEY=fakekey" >> .env
          python -c "import main; print('Backend OK')"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install and build
        run: |
          cd frontend
          npm install
          npm run build
